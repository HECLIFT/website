project:
  type: website
  output-dir: _site
  resources:
    - data/ai-trackers/**
    - data/innovation-data/**
    - data/pubs.json
    - assets/maps/**
  pre-render:
    - scripts/gen_pub_meta.py
    - scripts/build_members.py
    - scripts/build_feature.py
    - scripts/build_tracker_data.py
    - scripts/gen_wp_json.py

website:
  site-url: https://heclift.github.io/website
  title: "Laboratoire de l'Innovation et du Futur du Travail"
  search: true
  navbar:
    logo: images/logo.png
    title: |
      <span class="navbar-brand-text">
        <span class="line1">Laboratoire de l'Innovation</span>
        <span class="line2">et du Futur du Travail</span>
      </span>
    right:
      - text: "Accueil"
        href: index.qmd
      - text: "Publications"
        href: publications.qmd
      - text: "Trackers IA"
        menu:
          - text: "Vue d'ensemble"
            href: ai-trackers.qmd
          - text: "---"
          - text: "Diffusion IA (emploi)"
            href: ai-trackers/diffusion-emploi/index.qmd
          - text: "Diffusion IA (science)"
            href: ai-trackers/diffusion-science/index.qmd
      - text: "Données Innovation"
        menu:
          - text: "Vue d'ensemble"
            href: innovation-data.qmd
          - text: "---"
          - text: "Productivité"
            href: innovation-data/productivite/index.qmd
          - text: "Innovation high-tech"
            href: innovation-data/innovation-hightech/index.qmd
          - text: "Innovation de rupture"
            href: innovation-data/breakthrough/index.qmd
      - text: "Membres"
        href: membres.qmd
  page-footer:
    background: light
    left: |
      <span class="footer-brand">Laboratoire de l'Innovation et du Futur du Travail</span>
      <span class="footer-affiliation">HEC Paris · Hi! Paris</span>
    center:
      - text: "Publications"
        href: publications.qmd
      - text: "Trackers IA"
        href: ai-trackers.qmd
      - text: "Données"
        href: innovation-data.qmd
      - text: "Équipe"
        href: membres.qmd
      - text: "À propos"
        href: a-propos.qmd
    right: "© 2025 Laboratoire de l'Innovation"

format:
  html:
    theme: flatly
    grid:
      body-width: 1000px      # largeur du contenu (1100 -> 1200/1280)
      margin-width: 220px     # colonne marge (réduit si tu veux)
      gutter-width: 1.25rem   # gouttières

    include-in-header: _includes/head.html
    css: styles.scss

lang: fr           # attribut HTML lang
language: fr       # pack de traductions Quarto
metadata-files:
  - _language-fr-oift.yml   #  surcharges perso 


page-layout: full
class: pubpage

extensions:
  - _extensions/pubpage
  - _extensions/member
  - _extensions/homepage
