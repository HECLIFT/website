<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" font-family="'IBM Plex Mono', monospace">
  <defs>
    <pattern id="grid-fx" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#d0d7de" stroke-width="0.5" opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="500" fill="#eef0f3"/>
  <rect width="800" height="500" fill="url(#grid-fx)"/>

  <line x1="40" y1="60" x2="760" y2="60" stroke="#c4cdd6" stroke-width="1"/>
  <text x="40" y="48" font-size="11" fill="#8c959f" letter-spacing="2">// WORKING PAPER · MARCHÉ DU TRAVAIL</text>
  <text x="760" y="48" font-size="11" fill="#8c959f" text-anchor="end" letter-spacing="2">EU · US · 2025</text>

  <text x="40" y="120" font-family="'Space Grotesk', sans-serif" font-size="46" font-weight="700" fill="#0d1117" letter-spacing="-1.5">Cost of Failure</text>
  <text x="40" y="166" font-family="'Space Grotesk', sans-serif" font-size="46" font-weight="700" fill="#0d1117" letter-spacing="-1.5">&amp; Flexicurity</text>
  <text x="40" y="204" font-size="12" fill="#57606a" letter-spacing="1">INNOVATION DE RUPTURE · PROTECTION · R&amp;D</text>

  <!-- Scatter: rigidity vs innovation -->
  <g transform="translate(60, 240)">
    <text x="0" y="-10" font-size="9" fill="#8c959f" letter-spacing="1">RIGIDITÉ MARCHÉ DU TRAVAIL vs. INTENSITÉ INNOVATION</text>

    <!-- Axes -->
    <line x1="0" y1="180" x2="660" y2="180" stroke="#c4cdd6" stroke-width="0.8"/>
    <line x1="0" y1="0"   x2="0"   y2="180" stroke="#c4cdd6" stroke-width="0.8"/>
    <text x="330" y="198" font-size="9" fill="#8c959f" text-anchor="middle">RIGIDITÉ →</text>
    <text x="-12" y="90"  font-size="9" fill="#8c959f" text-anchor="middle" transform="rotate(-90,-12,90)">R&amp;D →</text>

    <!-- Trend line (negative) -->
    <line x1="20" y1="30" x2="620" y2="155" stroke="#c4cdd6" stroke-width="1" stroke-dasharray="4,4"/>

    <!-- Country dots -->
    <circle cx="80"  cy="35"  r="10" fill="#0050a0" opacity="0.85"/>
    <text x="94"  y="32"  font-size="9" fill="#0050a0">US</text>

    <circle cx="130" cy="55"  r="8"  fill="#0050a0" opacity="0.75"/>
    <text x="142" y="52"  font-size="9" fill="#0050a0">UK</text>

    <circle cx="280" cy="95"  r="9"  fill="#57606a" opacity="0.7"/>
    <text x="294" y="92"  font-size="9" fill="#57606a">DE</text>

    <circle cx="370" cy="110" r="8"  fill="#57606a" opacity="0.65"/>
    <text x="384" y="107" font-size="9" fill="#57606a">FR</text>

    <circle cx="460" cy="130" r="7"  fill="#57606a" opacity="0.6"/>
    <text x="474" y="127" font-size="9" fill="#57606a">IT</text>

    <circle cx="560" cy="152" r="7"  fill="#8c959f" opacity="0.7"/>
    <text x="574" y="149" font-size="9" fill="#8c959f">ES</text>

    <!-- Annotation box: flexicurity target -->
    <rect x="200" y="40" width="140" height="36" fill="none" stroke="#0050a0" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="270" y="56"  font-size="9" fill="#0050a0" text-anchor="middle">ZONE</text>
    <text x="270" y="70"  font-size="9" fill="#0050a0" text-anchor="middle">FLEXICURITÉ CIBLÉE</text>
  </g>

  <line x1="40" y1="470" x2="760" y2="470" stroke="#d0d7de" stroke-width="1"/>
  <text x="40" y="490" font-size="10" fill="#8c959f" letter-spacing="1">LIFT · HEC PARIS</text>
  <text x="760" y="490" font-size="10" fill="#8c959f" text-anchor="end" letter-spacing="1">WORKING PAPER · 2025</text>
</svg>
