<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" font-family="'IBM Plex Mono', monospace">
  <defs>
    <pattern id="grid-ai" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#d0d7de" stroke-width="0.5" opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="500" fill="#eef0f3"/>
  <rect width="800" height="500" fill="url(#grid-ai)"/>

  <line x1="40" y1="60" x2="760" y2="60" stroke="#c4cdd6" stroke-width="1"/>
  <text x="40" y="48" font-size="11" fill="#8c959f" letter-spacing="2">// WORKING PAPER · BREVETS &amp; IA</text>
  <text x="760" y="48" font-size="11" fill="#8c959f" text-anchor="end" letter-spacing="2">PCT · INTERNATIONAL · 2025</text>

  <text x="40" y="125" font-family="'Space Grotesk', sans-serif" font-size="52" font-weight="700" fill="#0d1117" letter-spacing="-1.5">IA &amp; Innovation</text>
  <text x="40" y="177" font-family="'Space Grotesk', sans-serif" font-size="52" font-weight="700" fill="#0d1117" letter-spacing="-1.5">Brevets PCT</text>
  <text x="40" y="215" font-size="12" fill="#57606a" letter-spacing="1">ANALYSE EMPIRIQUE · DONNÉES PCT · PANEL ENTREPRISES</text>

  <!-- Rising line chart: patent counts over time -->
  <g transform="translate(40, 255)">
    <text x="0" y="-8" font-size="9" fill="#8c959f" letter-spacing="1">BREVETS IA PAR ANNÉE (INDICE)</text>

    <!-- Axes -->
    <line x1="0" y1="170" x2="700" y2="170" stroke="#c4cdd6" stroke-width="0.8"/>
    <line x1="0" y1="0"   x2="0"   y2="170" stroke="#c4cdd6" stroke-width="0.8"/>

    <!-- Year labels -->
    <text x="0"   y="185" font-size="9" fill="#8c959f">2000</text>
    <text x="160" y="185" font-size="9" fill="#8c959f">2005</text>
    <text x="330" y="185" font-size="9" fill="#8c959f">2010</text>
    <text x="500" y="185" font-size="9" fill="#8c959f">2015</text>
    <text x="660" y="185" font-size="9" fill="#8c959f">2020</text>

    <!-- Rising curve (polyline) -->
    <polyline points="0,155 80,148 160,138 240,125 320,110 400,88 480,62 560,38 640,18 700,8"
              fill="none" stroke="#0050a0" stroke-width="2.5" stroke-linejoin="round"/>

    <!-- Area fill -->
    <polygon points="0,155 80,148 160,138 240,125 320,110 400,88 480,62 560,38 640,18 700,8 700,170 0,170"
             fill="#0050a0" fill-opacity="0.08"/>

    <!-- Dots at key points -->
    <circle cx="320" cy="110" r="4" fill="#0050a0"/>
    <circle cx="480" cy="62"  r="4" fill="#0050a0"/>
    <circle cx="700" cy="8"   r="5" fill="#0050a0"/>

    <!-- Annotation -->
    <line x1="480" y1="62" x2="520" y2="30" stroke="#8c959f" stroke-width="0.8"/>
    <text x="522" y="28" font-size="9" fill="#0050a0" letter-spacing="0.5">+67% post-2015</text>
  </g>

  <line x1="40" y1="470" x2="760" y2="470" stroke="#d0d7de" stroke-width="1"/>
  <text x="40" y="490" font-size="10" fill="#8c959f" letter-spacing="1">AUTEURS · BERGEAUD ET AL.</text>
  <text x="760" y="490" font-size="10" fill="#8c959f" text-anchor="end" letter-spacing="1">HEC PARIS · LIFT · 2025</text>
</svg>
