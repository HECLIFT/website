<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" font-family="'IBM Plex Mono', monospace">
  <defs>
    <pattern id="grid-ae" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#d0d7de" stroke-width="0.5" opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="500" fill="#eef0f3"/>
  <rect width="800" height="500" fill="url(#grid-ae)"/>

  <line x1="40" y1="60" x2="760" y2="60" stroke="#c4cdd6" stroke-width="1"/>
  <text x="40" y="48" font-size="11" fill="#8c959f" letter-spacing="2">// WORKING PAPER · IA &amp; EMPLOI</text>
  <text x="760" y="48" font-size="11" fill="#8c959f" text-anchor="end" letter-spacing="2">FRANCE · CSP · 2024</text>

  <text x="40" y="120" font-family="'Space Grotesk', sans-serif" font-size="50" font-weight="700" fill="#0d1117" letter-spacing="-1.5">Exposition</text>
  <text x="40" y="170" font-family="'Space Grotesk', sans-serif" font-size="50" font-weight="700" fill="#0d1117" letter-spacing="-1.5">à l'IA gén.</text>
  <text x="40" y="208" font-size="12" fill="#57606a" letter-spacing="1">INDICE D'EXPOSITION · 80 CSP · IA GÉNÉRATIVE</text>

  <!-- Horizontal bars: CSP exposure index -->
  <g transform="translate(40, 240)">
    <text x="0" y="-8" font-size="9" fill="#8c959f" letter-spacing="1">INDICE D'EXPOSITION PAR CATÉGORIE</text>

    <!-- Bars -->
    <rect x="160" y="0"   width="480" height="18" fill="#0050a0" opacity="0.85"/>
    <rect x="160" y="24"  width="400" height="18" fill="#0050a0" opacity="0.75"/>
    <rect x="160" y="48"  width="340" height="18" fill="#0050a0" opacity="0.65"/>
    <rect x="160" y="72"  width="260" height="18" fill="#0050a0" opacity="0.55"/>
    <rect x="160" y="96"  width="180" height="18" fill="#0078d4" opacity="0.45"/>
    <rect x="160" y="120" width="120" height="18" fill="#0078d4" opacity="0.35"/>
    <rect x="160" y="144" width="70"  height="18" fill="#8c959f" opacity="0.4"/>

    <!-- Labels left -->
    <text x="155" y="13"  font-size="9" fill="#0d1117" text-anchor="end">Cadres sup.</text>
    <text x="155" y="37"  font-size="9" fill="#0d1117" text-anchor="end">Prof. interméd.</text>
    <text x="155" y="61"  font-size="9" fill="#0d1117" text-anchor="end">Employés admin.</text>
    <text x="155" y="85"  font-size="9" fill="#0d1117" text-anchor="end">Techniciens</text>
    <text x="155" y="109" font-size="9" fill="#0d1117" text-anchor="end">Ouvriers qual.</text>
    <text x="155" y="133" font-size="9" fill="#0d1117" text-anchor="end">Employés comm.</text>
    <text x="155" y="157" font-size="9" fill="#0d1117" text-anchor="end">Ouvriers non-q.</text>

    <!-- Values -->
    <text x="644" y="13"  font-size="9" fill="#0050a0" letter-spacing="0.5">0.84</text>
    <text x="564" y="37"  font-size="9" fill="#0050a0" letter-spacing="0.5">0.71</text>
    <text x="504" y="61"  font-size="9" fill="#0050a0" letter-spacing="0.5">0.60</text>
    <text x="424" y="85"  font-size="9" fill="#0050a0" letter-spacing="0.5">0.46</text>
    <text x="344" y="109" font-size="9" fill="#0078d4" letter-spacing="0.5">0.32</text>
    <text x="284" y="133" font-size="9" fill="#0078d4" letter-spacing="0.5">0.21</text>
    <text x="234" y="157" font-size="9" fill="#8c959f" letter-spacing="0.5">0.12</text>
  </g>

  <line x1="40" y1="470" x2="760" y2="470" stroke="#d0d7de" stroke-width="1"/>
  <text x="40" y="490" font-size="10" fill="#8c959f" letter-spacing="1">AUTEURS · BERGEAUD ET AL.</text>
  <text x="760" y="490" font-size="10" fill="#8c959f" text-anchor="end" letter-spacing="1">HEC PARIS · LIFT</text>
</svg>
