  <line x1="40" y1="470" x2="760" y2="470" stroke="#d0d7de" stroke-width="1"></line>
  <text x="40" y="490" font-size="10" fill="#8c959f" letter-spacing="1">SOURCE · BERGEAUD · CETTE · LECAT</text>
  <text x="760" y="490" font-size="10" fill="#8c959f" text-anchor="end" letter-spacing="1">MAJ ANNUELLE</text>
