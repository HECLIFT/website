<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" font-family="&#39;IBM Plex Mono&#39;, monospace">
  <defs>
    <pattern id="grid-prod" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#d0d7de" stroke-width="0.5" opacity="0.5"></path>
    </pattern>
  </defs>
  <rect width="800" height="500" fill="#eef0f3"></rect>
  <rect width="800" height="500" fill="url(#grid-prod)"></rect>

  <line x1="40" y1="60" x2="760" y2="60" stroke="#c4cdd6" stroke-width="1"></line>
